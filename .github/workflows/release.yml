name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches package version
        # GitHub release `tag_name` is something like "v0.1.0"; strip the
        # leading "v" and compare to project.version in pyproject.toml.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##*/}"
          tag_version="${tag#v}"
          pkg_version="$(python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Release tag $tag (=$tag_version) does not match pyproject version $pkg_version"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pngd
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
